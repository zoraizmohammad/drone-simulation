# Camera Configuration (Raspberry Pi Camera Module v2 or HQ Camera)
camera:
  index: 0                      # /dev/video0
  resolution: [1280, 720]       # Capture resolution
  fps: 30
  # Intrinsic calibration matrix (run camera_calibration.py to generate)
  # These are example values for RPi Camera v2 at 1280x720
  intrinsic_matrix:
    fx: 984.25                  # Focal length x (pixels)
    fy: 984.25                  # Focal length y (pixels)
    cx: 640.0                   # Principal point x
    cy: 360.0                   # Principal point y
  distortion_coeffs: [-0.35, 0.12, 0.0, 0.0, 0.0]   # k1, k2, p1, p2, k3

# Inference resolution (smaller = faster on RPi)
inference:
  input_size: [640, 640]        # YOLOv8 input
  conf_threshold: 0.35          # Minimum detection confidence
  iou_threshold: 0.45           # NMS IoU threshold
  max_detections: 20

# Known flower physical dimensions (for monocular depth estimation)
flower_geometry:
  avg_flower_width_m: 0.05      # ~5cm average flower head width
  avg_flower_height_m: 0.05
  stem_height_m: 0.30           # ~30cm stem height

# Camera mount on drone
mount:
  pitch_deg: -90.0              # Camera points straight down
  yaw_offset_deg: 0.0           # Aligned with drone forward axis
  x_offset_m: 0.0               # Center of drone body
  y_offset_m: 0.0
  z_offset_m: 0.05              # 5cm below center
