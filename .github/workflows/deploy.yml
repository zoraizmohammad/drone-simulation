name: CI — Build Check

# Vercel deploys automatically via its GitHub integration (production on main,
# preview on every PR). This workflow exists solely to catch TypeScript errors
# and broken builds on feature branches before they reach main.

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: TypeScript + Vite build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build
        env:
          # Dummy values so VITE_ env vars resolve during CI build;
          # real values are set as Vercel environment variables.
          VITE_AGENT_API_URL: http://localhost:8766
          VITE_INFERENCE_WS_URL: ws://localhost:8765/inference
